<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hama Bead Pattern Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent2: #0f3460;
  --text: #eee;
  --muted: #999;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  padding: 30px 20px 10px;
}
.header h1 {
  font-size: 28px;
  background: linear-gradient(135deg, #e94560, #FFD700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header p { color: var(--muted); margin-top: 6px; font-size: 14px; }

/* Layout */
.app {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
}
@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
}

/* Sidebar */
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid rgba(255,255,255,.05);
}
.card h3 {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 14px;
}

/* Upload */
.upload-zone {
  border: 2px dashed rgba(233,69,96,.4);
  border-radius: var(--radius);
  padding: 30px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: rgba(233,69,96,.05);
}
.upload-zone svg { width: 40px; height: 40px; color: var(--accent); margin-bottom: 10px; }
.upload-zone p { font-size: 14px; color: var(--muted); }
.upload-zone span { font-size: 12px; color: #666; }
#fileInput { display: none; }

/* Preview thumbnail */
.thumb-wrap {
  margin-top: 12px;
  display: none;
  position: relative;
}
.thumb-wrap img {
  width: 100%;
  max-height: 180px;
  object-fit: contain;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,.1);
}

/* Controls */
.control { margin-bottom: 14px; }
.control label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
.control label strong { color: var(--text); }
input[type="range"] {
  width: 100%;
  accent-color: var(--accent);
  height: 6px;
}
select {
  width: 100%;
  padding: 8px 12px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
}
select option { background: var(--card); }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
}
.checkbox-row input { accent-color: var(--accent); }

/* Buttons */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #c73e54);
  color: white;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(233,69,96,.4); }
.btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-secondary {
  background: linear-gradient(135deg, var(--accent2), #1a4a8a);
  color: white;
  margin-top: 8px;
}
.btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(15,52,96,.4); }
.btn-secondary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

/* Main area */
.main { min-height: 400px; }
.preview-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid rgba(255,255,255,.05);
  min-height: 400px;
  display: flex;
  flex-direction: column;
}
.preview-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
.preview-header h3 {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
}
.stats { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); }

/* Canvas container */
.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
  background: rgba(0,0,0,.2);
  border-radius: 8px;
  padding: 10px;
  position: relative;
}
.canvas-wrap canvas { image-rendering: pixelated; }
#emptyState {
  color: var(--muted);
  font-size: 15px;
  text-align: center;
}
#emptyState svg { display: block; margin: 0 auto 12px; width: 50px; opacity: .3; }

/* Color legend */
.color-legend {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 16px;
  border: 1px solid rgba(255,255,255,.05);
  display: none;
}
.color-legend h3 {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--accent);
  margin-bottom: 14px;
}
.colors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
}
.color-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: rgba(255,255,255,.03);
  border-radius: 8px;
  font-size: 13px;
}
.color-swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.15);
  flex-shrink: 0;
  position: relative;
}
.color-swatch::after {
  content: '';
  position: absolute;
  width: 7px; height: 7px;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(0,0,0,.2);
}
.color-name { flex: 1; }
.color-count { font-weight: 700; color: var(--accent); }

/* Loading */
.spinner {
  display: none;
  width: 40px; height: 40px;
  border: 3px solid rgba(233,69,96,.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Hama Bead Pattern Generator</h1>
  <p>Sube una imagen, ajusta el tamano y descarga el patron en PDF</p>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Upload -->
    <div class="card">
      <h3>Imagen</h3>
      <div class="upload-zone" id="uploadZone">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <p>Arrastra tu imagen aqui</p>
        <span>o haz click para seleccionar</span>
        <input type="file" id="fileInput" accept="image/*">
      </div>
      <div class="thumb-wrap" id="thumbWrap">
        <img id="thumbImg" alt="preview">
      </div>
    </div>

    <!-- Settings -->
    <div class="card">
      <h3>Ajustes</h3>

      <div class="control">
        <label>Ancho (cuentas) <strong id="widthVal">29</strong></label>
        <input type="range" id="gridWidth" min="10" max="80" value="29">
      </div>

      <div class="control">
        <label>Estilo</label>
        <select id="styleSelect">
          <option value="outline">Contorno grueso (recomendado)</option>
          <option value="detailed">Detallado</option>
          <option value="minimal">Minimalista</option>
        </select>
      </div>

      <div class="control">
        <label>Max colores <strong id="maxColVal">10</strong></label>
        <input type="range" id="maxColors" min="3" max="25" value="10">
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="removeBg" checked>
        <label for="removeBg">Simplificar fondo</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="showGrid" checked>
        <label for="showGrid">Mostrar rejilla en preview</label>
      </div>
    </div>

    <!-- Actions -->
    <div class="card">
      <h3>Generar</h3>
      <button class="btn btn-primary" id="generateBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
        Generar Patron
      </button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
        Descargar PDF
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="preview-card">
      <div class="preview-header">
        <h3>Vista Previa</h3>
        <div class="stats" id="statsBar" style="display:none">
          <div class="stat"><div class="stat-val" id="statSize">-</div><div class="stat-lbl">Tamano</div></div>
          <div class="stat"><div class="stat-val" id="statBeads">-</div><div class="stat-lbl">Cuentas</div></div>
          <div class="stat"><div class="stat-val" id="statColors">-</div><div class="stat-lbl">Colores</div></div>
        </div>
      </div>
      <div class="canvas-wrap" id="canvasWrap">
        <div id="emptyState">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.41a2.25 2.25 0 013.182 0l2.909 2.91m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5z"/>
          </svg>
          Sube una imagen para empezar
        </div>
        <div class="spinner" id="spinner"></div>
        <canvas id="previewCanvas" style="display:none"></canvas>
      </div>
    </div>
    <div class="color-legend" id="colorLegend">
      <h3>Colores necesarios</h3>
      <div class="colors-grid" id="colorsGrid"></div>
    </div>
  </div>
</div>

<script>
// ========== HAMA BEAD COLOR PALETTE ==========
const HAMA_PALETTE = [
  { name: "Blanco",         hex: "#FFFFFF", rgb: [255,255,255] },
  { name: "Crema",          hex: "#FFF4CC", rgb: [255,244,204] },
  { name: "Amarillo claro", hex: "#FFF59D", rgb: [255,245,157] },
  { name: "Amarillo",       hex: "#FFD700", rgb: [255,215,0] },
  { name: "Dorado",         hex: "#DAA520", rgb: [218,165,32] },
  { name: "Naranja claro",  hex: "#FFB347", rgb: [255,179,71] },
  { name: "Naranja",        hex: "#FF8C00", rgb: [255,140,0] },
  { name: "Melocoton",      hex: "#FFDAB9", rgb: [255,218,185] },
  { name: "Piel claro",     hex: "#FFE4C4", rgb: [255,228,196] },
  { name: "Piel",           hex: "#FFCCAA", rgb: [255,204,170] },
  { name: "Piel oscuro",    hex: "#D2A679", rgb: [210,166,121] },
  { name: "Rosa claro",     hex: "#FFB6C1", rgb: [255,182,193] },
  { name: "Rosa",           hex: "#FF69B4", rgb: [255,105,180] },
  { name: "Rosa fuerte",    hex: "#FF1493", rgb: [255,20,147] },
  { name: "Rojo",           hex: "#DC2626", rgb: [220,38,38] },
  { name: "Rojo oscuro",    hex: "#8B0000", rgb: [139,0,0] },
  { name: "Magenta",        hex: "#C71585", rgb: [199,21,133] },
  { name: "Lavanda",        hex: "#CE93D8", rgb: [206,147,216] },
  { name: "Lila",           hex: "#DDA0DD", rgb: [221,160,221] },
  { name: "Morado",         hex: "#800080", rgb: [128,0,128] },
  { name: "Azul pastel",    hex: "#B0C4FF", rgb: [176,196,255] },
  { name: "Azul cielo",     hex: "#87CEEB", rgb: [135,206,235] },
  { name: "Azul claro",     hex: "#6495ED", rgb: [100,149,237] },
  { name: "Azul",           hex: "#2563EB", rgb: [37,99,235] },
  { name: "Azul oscuro",    hex: "#1E3A7B", rgb: [30,58,123] },
  { name: "Azul marino",    hex: "#0D1B5E", rgb: [13,27,94] },
  { name: "Turquesa",       hex: "#40E0D0", rgb: [64,224,208] },
  { name: "Verde claro",    hex: "#90EE90", rgb: [144,238,144] },
  { name: "Verde",          hex: "#228B22", rgb: [34,139,34] },
  { name: "Verde oscuro",   hex: "#006400", rgb: [0,100,0] },
  { name: "Verde lima",     hex: "#7CFC00", rgb: [124,252,0] },
  { name: "Marron claro",   hex: "#D2B48C", rgb: [210,180,140] },
  { name: "Marron",         hex: "#8B4513", rgb: [139,69,19] },
  { name: "Marron oscuro",  hex: "#3E1F0D", rgb: [62,31,13] },
  { name: "Gris claro",     hex: "#C0C0C0", rgb: [192,192,192] },
  { name: "Gris",           hex: "#808080", rgb: [128,128,128] },
  { name: "Gris oscuro",    hex: "#404040", rgb: [64,64,64] },
  { name: "Negro",          hex: "#1A1A1A", rgb: [26,26,26] },
];

// ========== STATE ==========
let sourceImage = null;
let patternData = null; // { grid, width, height, colors }

// ========== DOM ==========
const $ = id => document.getElementById(id);
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');
const thumbWrap = $('thumbWrap');
const thumbImg = $('thumbImg');
const gridWidthSlider = $('gridWidth');
const widthVal = $('widthVal');
const maxColorsSlider = $('maxColors');
const maxColVal = $('maxColVal');
const generateBtn = $('generateBtn');
const downloadBtn = $('downloadBtn');
const previewCanvas = $('previewCanvas');
const canvasWrap = $('canvasWrap');
const emptyState = $('emptyState');
const spinner = $('spinner');
const statsBar = $('statsBar');
const colorLegend = $('colorLegend');
const colorsGrid = $('colorsGrid');

// ========== UPLOAD ==========
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      sourceImage = img;
      thumbImg.src = e.target.result;
      thumbWrap.style.display = 'block';
      generateBtn.disabled = false;
      generatePattern();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ========== SLIDERS ==========
gridWidthSlider.addEventListener('input', () => {
  widthVal.textContent = gridWidthSlider.value;
  if (sourceImage) generatePattern();
});
maxColorsSlider.addEventListener('input', () => {
  maxColVal.textContent = maxColorsSlider.value;
  if (sourceImage) generatePattern();
});
$('styleSelect').addEventListener('change', () => { if (sourceImage) generatePattern(); });
$('removeBg').addEventListener('change', () => { if (sourceImage) generatePattern(); });
$('showGrid').addEventListener('change', () => { if (patternData) renderPreview(); });
generateBtn.addEventListener('click', generatePattern);
downloadBtn.addEventListener('click', downloadPDF);

// ========== COLOR MATH ==========
function colorDist(c1, c2) {
  const rmean = (c1[0] + c2[0]) / 2;
  const dr = c1[0] - c2[0];
  const dg = c1[1] - c2[1];
  const db = c1[2] - c2[2];
  return Math.sqrt((2 + rmean/256) * dr*dr + 4 * dg*dg + (2 + (255-rmean)/256) * db*db);
}

function nearestHama(rgb, palette) {
  let best = palette[0], bestD = Infinity;
  for (const c of palette) {
    const d = colorDist(rgb, c.rgb);
    if (d < bestD) { bestD = d; best = c; }
  }
  return best;
}

// K-means-ish: reduce image to N dominant colors, then map each to nearest hama
function quantizeColors(pixels, w, h, maxColors) {
  // Collect all pixel colors
  const allColors = [];
  for (let i = 0; i < pixels.length; i += 4) {
    if (pixels[i+3] < 128) continue; // skip transparent
    allColors.push([pixels[i], pixels[i+1], pixels[i+2]]);
  }

  // Simple median cut quantization
  const buckets = [allColors];
  while (buckets.length < maxColors && buckets.length < allColors.length) {
    // Find bucket with largest range
    let maxRange = -1, maxIdx = 0;
    for (let i = 0; i < buckets.length; i++) {
      const b = buckets[i];
      if (b.length < 2) continue;
      for (let ch = 0; ch < 3; ch++) {
        const vals = b.map(c => c[ch]);
        const range = Math.max(...vals) - Math.min(...vals);
        if (range > maxRange) { maxRange = range; maxIdx = i; }
      }
    }
    const bucket = buckets[maxIdx];
    // Find channel with max range
    let splitCh = 0, splitRange = 0;
    for (let ch = 0; ch < 3; ch++) {
      const vals = bucket.map(c => c[ch]);
      const range = Math.max(...vals) - Math.min(...vals);
      if (range > splitRange) { splitRange = range; splitCh = ch; }
    }
    bucket.sort((a, b) => a[splitCh] - b[splitCh]);
    const mid = Math.floor(bucket.length / 2);
    buckets.splice(maxIdx, 1, bucket.slice(0, mid), bucket.slice(mid));
  }

  // Get average color per bucket
  const palette = buckets.filter(b => b.length > 0).map(b => {
    const avg = [0,0,0];
    for (const c of b) { avg[0] += c[0]; avg[1] += c[1]; avg[2] += c[2]; }
    return [Math.round(avg[0]/b.length), Math.round(avg[1]/b.length), Math.round(avg[2]/b.length)];
  });

  // Map each palette color to nearest hama
  return palette.map(c => nearestHama(c, HAMA_PALETTE));
}

// ========== GENERATE PATTERN ==========
function generatePattern() {
  if (!sourceImage) return;

  emptyState.style.display = 'none';
  spinner.style.display = 'block';
  previewCanvas.style.display = 'none';

  requestAnimationFrame(() => {
    setTimeout(() => {
      try { doGenerate(); } catch(e) { console.error(e); }
      spinner.style.display = 'none';
    }, 50);
  });
}

function doGenerate() {
  const gw = parseInt(gridWidthSlider.value);
  const style = $('styleSelect').value;
  const maxCol = parseInt(maxColorsSlider.value);
  const removeBg = $('removeBg').checked;

  const img = sourceImage;
  const aspect = img.height / img.width;
  const gh = Math.round(gw * aspect);

  // Draw image small
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = gw;
  tmpCanvas.height = gh;
  const ctx = tmpCanvas.getContext('2d');
  ctx.drawImage(img, 0, 0, gw, gh);
  const imageData = ctx.getImageData(0, 0, gw, gh);
  const pixels = imageData.data;

  // Get reduced palette
  const usedHama = quantizeColors(pixels, gw, gh, maxCol);

  // Remove duplicates
  const paletteMap = new Map();
  for (const c of usedHama) paletteMap.set(c.name, c);
  const palette = [...paletteMap.values()];

  // Background detection
  let bgColor = null;
  if (removeBg) {
    // Sample corners
    const corners = [];
    const sample = (x, y) => {
      const i = (y * gw + x) * 4;
      return [pixels[i], pixels[i+1], pixels[i+2]];
    };
    for (let x = 0; x < Math.min(3, gw); x++)
      for (let y = 0; y < Math.min(3, gh); y++)
        corners.push(sample(x, y));
    for (let x = Math.max(0, gw-3); x < gw; x++)
      for (let y = 0; y < Math.min(3, gh); y++)
        corners.push(sample(x, y));

    // Average corner color
    const avg = [0,0,0];
    for (const c of corners) { avg[0] += c[0]; avg[1] += c[1]; avg[2] += c[2]; }
    avg[0] /= corners.length; avg[1] /= corners.length; avg[2] /= corners.length;
    bgColor = avg;
  }

  // Map each pixel
  const grid = [];
  const colorCount = {};
  let totalBeads = 0;

  for (let y = 0; y < gh; y++) {
    const row = [];
    for (let x = 0; x < gw; x++) {
      const i = (y * gw + x) * 4;
      const r = pixels[i], g = pixels[i+1], b = pixels[i+2], a = pixels[i+3];

      // Check if background
      if (removeBg && bgColor && a > 128) {
        const dist = colorDist([r,g,b], bgColor);
        if (dist < 80) {
          row.push(null); // empty
          continue;
        }
      }
      if (a < 128) {
        row.push(null);
        continue;
      }

      const nearest = nearestHama([r,g,b], palette);
      row.push(nearest);
      colorCount[nearest.name] = (colorCount[nearest.name] || 0) + 1;
      totalBeads++;
    }
    grid.push(row);
  }

  // Apply outline enhancement for "outline" style
  if (style === 'outline') {
    const black = HAMA_PALETTE.find(c => c.name === 'Negro');
    // Add black outline around non-empty areas
    const outlined = grid.map(r => [...r]);
    for (let y = 0; y < gh; y++) {
      for (let x = 0; x < gw; x++) {
        if (grid[y][x] !== null) continue;
        // Check if adjacent to a colored bead
        let adjacent = false;
        for (const [dx, dy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nx = x + dx, ny = y + dy;
          if (nx >= 0 && nx < gw && ny >= 0 && ny < gh && grid[ny][nx] !== null) {
            adjacent = true;
            break;
          }
        }
        if (adjacent) {
          outlined[y][x] = black;
          colorCount[black.name] = (colorCount[black.name] || 0) + 1;
          totalBeads++;
        }
      }
    }
    // Copy back
    for (let y = 0; y < gh; y++)
      for (let x = 0; x < gw; x++)
        grid[y][x] = outlined[y][x];
  }

  // Sort colors by count
  const sortedColors = Object.entries(colorCount)
    .sort((a, b) => b[1] - a[1])
    .map(([name, count]) => ({
      ...HAMA_PALETTE.find(c => c.name === name),
      count
    }));

  patternData = { grid, width: gw, height: gh, colors: sortedColors, totalBeads };

  // Update stats
  statsBar.style.display = 'flex';
  $('statSize').textContent = `${gw}x${gh}`;
  $('statBeads').textContent = totalBeads;
  $('statColors').textContent = sortedColors.length;

  // Color legend
  colorLegend.style.display = 'block';
  colorsGrid.innerHTML = sortedColors.map(c => `
    <div class="color-item">
      <div class="color-swatch" style="background:${c.hex}"></div>
      <div class="color-name">${c.name}</div>
      <div class="color-count">x${c.count}</div>
    </div>
  `).join('');

  renderPreview();
  downloadBtn.disabled = false;
}

// ========== RENDER PREVIEW ==========
function renderPreview() {
  if (!patternData) return;
  const { grid, width: gw, height: gh } = patternData;
  const showGrid = $('showGrid').checked;

  const beadSize = Math.max(8, Math.min(24, Math.floor(600 / Math.max(gw, gh))));
  const gap = showGrid ? 1 : 0;
  const cellSize = beadSize + gap;

  const canvas = previewCanvas;
  canvas.width = gw * cellSize + gap;
  canvas.height = gh * cellSize + gap;
  canvas.style.display = 'block';
  canvas.style.maxWidth = '100%';

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#d4c5a9'; // pegboard color
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const bead = grid[y][x];
      const px = x * cellSize + gap;
      const py = y * cellSize + gap;

      if (bead === null) {
        if (showGrid) {
          // Empty pegboard dot
          ctx.fillStyle = '#c8b998';
          ctx.beginPath();
          ctx.arc(px + beadSize/2, py + beadSize/2, 2, 0, Math.PI*2);
          ctx.fill();
        }
        continue;
      }

      const [r, g, b] = bead.rgb;

      // Bead circle
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(px + beadSize/2, py + beadSize/2, beadSize/2 - 0.5, 0, Math.PI*2);
      ctx.fill();

      // Center hole
      ctx.fillStyle = `rgb(${Math.max(0,r-35)},${Math.max(0,g-35)},${Math.max(0,b-35)})`;
      ctx.beginPath();
      ctx.arc(px + beadSize/2, py + beadSize/2, beadSize/6, 0, Math.PI*2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = `rgba(255,255,255,0.25)`;
      ctx.beginPath();
      ctx.arc(px + beadSize/3, py + beadSize/3, beadSize/6, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

// ========== PDF GENERATION ==========
function downloadPDF() {
  if (!patternData) return;

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pageW = 210, pageH = 297;
  const margin = 15;
  const usableW = pageW - margin * 2;

  const { grid, width: gw, height: gh, colors, totalBeads } = patternData;

  // ===== PAGE 1: Title + Pattern =====
  // Title
  pdf.setFontSize(22);
  pdf.setTextColor(220, 38, 38);
  pdf.text('Hama Bead Pattern', pageW / 2, 20, { align: 'center' });

  pdf.setFontSize(11);
  pdf.setTextColor(100);
  pdf.text(`${gw} x ${gh} cuentas  |  ${totalBeads} total  |  ${colors.length} colores`, pageW / 2, 28, { align: 'center' });

  // Pattern grid
  const patternTop = 35;
  const maxPatternH = 200;
  const cellSize = Math.min(usableW / gw, maxPatternH / gh);
  const patternW = gw * cellSize;
  const patternH = gh * cellSize;
  const patternLeft = (pageW - patternW) / 2;

  // Draw grid background
  pdf.setFillColor(220, 215, 200);
  pdf.rect(patternLeft - 1, patternTop - 1, patternW + 2, patternH + 2, 'F');

  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const bead = grid[y][x];
      const px = patternLeft + x * cellSize;
      const py = patternTop + y * cellSize;

      if (bead === null) continue;

      const [r, g, b] = bead.rgb;
      pdf.setFillColor(r, g, b);

      // Draw circle
      const cx = px + cellSize / 2;
      const cy = py + cellSize / 2;
      const radius = cellSize / 2 - 0.2;
      pdf.circle(cx, cy, radius, 'F');

      // Grid lines (if cell big enough)
      if (cellSize > 2) {
        pdf.setDrawColor(180, 175, 160);
        pdf.setLineWidth(0.05);
        pdf.circle(cx, cy, radius, 'S');
      }
    }
  }

  // Row/column numbers every 5
  pdf.setFontSize(5);
  pdf.setTextColor(150);
  for (let x = 4; x < gw; x += 5) {
    pdf.text(String(x + 1), patternLeft + x * cellSize + cellSize/2, patternTop - 1, { align: 'center' });
  }
  for (let y = 4; y < gh; y += 5) {
    pdf.text(String(y + 1), patternLeft - 2, patternTop + y * cellSize + cellSize/2 + 1, { align: 'right' });
  }

  // ===== PAGE 2: Color Legend + Zoomed Sections =====
  pdf.addPage();

  pdf.setFontSize(18);
  pdf.setTextColor(220, 38, 38);
  pdf.text('Lista de Colores', pageW / 2, 20, { align: 'center' });

  let cy = 32;
  const swatchSize = 7;
  const rowH = 10;

  // Table header
  pdf.setFontSize(9);
  pdf.setTextColor(100);
  pdf.text('Color', margin + 12, cy);
  pdf.text('Nombre', margin + 30, cy);
  pdf.text('Cantidad', margin + usableW - 30, cy);
  pdf.text('%', margin + usableW - 5, cy);
  cy += 4;
  pdf.setDrawColor(200);
  pdf.line(margin, cy, margin + usableW, cy);
  cy += 6;

  for (const color of colors) {
    if (cy > pageH - 20) {
      pdf.addPage();
      cy = 20;
    }

    // Swatch
    const [r, g, b] = color.rgb;
    pdf.setFillColor(r, g, b);
    pdf.circle(margin + 5, cy - 1.5, 3, 'F');
    pdf.setDrawColor(150);
    pdf.setLineWidth(0.2);
    pdf.circle(margin + 5, cy - 1.5, 3, 'S');

    // Name
    pdf.setFontSize(10);
    pdf.setTextColor(50);
    pdf.text(color.name, margin + 12, cy);

    // Hex
    pdf.setFontSize(8);
    pdf.setTextColor(130);
    pdf.text(color.hex, margin + 55, cy);

    // Count
    pdf.setFontSize(10);
    pdf.setTextColor(220, 38, 38);
    pdf.text(`x${color.count}`, margin + usableW - 30, cy);

    // Percentage
    pdf.setTextColor(130);
    pdf.setFontSize(8);
    const pct = ((color.count / totalBeads) * 100).toFixed(1);
    pdf.text(`${pct}%`, margin + usableW - 5, cy);

    cy += rowH;
  }

  // Total
  cy += 4;
  pdf.setDrawColor(200);
  pdf.line(margin, cy, margin + usableW, cy);
  cy += 8;
  pdf.setFontSize(12);
  pdf.setTextColor(50);
  pdf.text(`Total: ${totalBeads} cuentas`, margin, cy);

  // Tips section
  cy += 14;
  if (cy < pageH - 60) {
    pdf.setFontSize(14);
    pdf.setTextColor(220, 38, 38);
    pdf.text('Tips', margin, cy);
    cy += 8;
    pdf.setFontSize(9);
    pdf.setTextColor(80);
    const tips = [
      `Tablero: necesitas un area de al menos ${gw} x ${gh} clavijas.`,
      'Empieza por los contornos negros para definir la forma.',
      'Luego rellena color por color de mas a menos cantidad.',
      'Plancha con papel de hornear a temperatura media.',
      'Deja enfriar bajo un libro para que quede plano.',
      'Puedes omitir las cuentas de fondo si solo quieres el personaje.',
    ];
    for (const tip of tips) {
      pdf.text(`  •  ${tip}`, margin, cy);
      cy += 6;
    }
  }

  // ===== PAGE 3: Pixel grid reference (numbered) =====
  pdf.addPage();

  pdf.setFontSize(18);
  pdf.setTextColor(220, 38, 38);
  pdf.text('Patron Detallado (con numeros)', pageW / 2, 20, { align: 'center' });

  const detailTop = 30;
  const detailCellMax = Math.min((usableW - 8) / gw, (pageH - detailTop - 20) / gh);
  const detailCell = Math.max(2, Math.min(detailCellMax, 6));
  const detailW = gw * detailCell;
  const detailH = gh * detailCell;
  const detailLeft = (pageW - detailW) / 2;

  // Color index mapping
  const colorIndex = {};
  colors.forEach((c, i) => { colorIndex[c.name] = i + 1; });

  // Background
  pdf.setFillColor(240, 238, 230);
  pdf.rect(detailLeft - 1, detailTop - 1, detailW + 2, detailH + 2, 'F');

  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const bead = grid[y][x];
      if (bead === null) continue;

      const px = detailLeft + x * detailCell;
      const py = detailTop + y * detailCell;
      const [r, g, b] = bead.rgb;

      pdf.setFillColor(r, g, b);
      pdf.rect(px, py, detailCell, detailCell, 'F');

      // Number in cell (if big enough)
      if (detailCell >= 3.5) {
        const idx = colorIndex[bead.name];
        const brightness = r * 0.299 + g * 0.587 + b * 0.114;
        pdf.setTextColor(brightness > 128 ? 0 : 255);
        pdf.setFontSize(detailCell * 0.55);
        pdf.text(String(idx), px + detailCell/2, py + detailCell * 0.7, { align: 'center' });
      }

      // Grid
      pdf.setDrawColor(200);
      pdf.setLineWidth(0.05);
      pdf.rect(px, py, detailCell, detailCell, 'S');
    }
  }

  // Row/col numbers
  pdf.setFontSize(4);
  pdf.setTextColor(150);
  for (let x = 0; x < gw; x += 5) {
    pdf.text(String(x + 1), detailLeft + x * detailCell + detailCell/2, detailTop - 1, { align: 'center' });
  }
  for (let y = 0; y < gh; y += 5) {
    pdf.text(String(y + 1), detailLeft - 2, detailTop + y * detailCell + detailCell/2 + 1, { align: 'right' });
  }

  // Color key at bottom
  let keyY = detailTop + detailH + 8;
  if (keyY < pageH - 30) {
    pdf.setFontSize(8);
    pdf.setTextColor(100);
    pdf.text('Clave de colores:', margin, keyY);
    keyY += 5;
    const cols = 4;
    const colW = usableW / cols;
    colors.forEach((c, i) => {
      const col = i % cols;
      const row = Math.floor(i / cols);
      const kx = margin + col * colW;
      const ky = keyY + row * 6;
      if (ky > pageH - 10) return;
      pdf.setFillColor(...c.rgb);
      pdf.rect(kx, ky - 3, 4, 4, 'F');
      pdf.setTextColor(60);
      pdf.setFontSize(6);
      pdf.text(`${i+1} = ${c.name} (x${c.count})`, kx + 6, ky);
    });
  }

  // Save
  pdf.save('hama_bead_pattern.pdf');
}
</script>
